services:
  db:
    image: pgvector/pgvector:pg17
    container_name: postgres-rag
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rag_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_rag_data:/var/lib/postgresql/data

volumes:
  postgres_rag_data: